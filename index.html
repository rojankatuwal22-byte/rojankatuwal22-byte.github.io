<!DOCTYPE html>
<html lang="ne">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rojan Katuwal | Video Creator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f8fafc;
      color: #1e293b;
      line-height: 1.6;
    }
    .container { max-width: 800px; margin: auto; padding: 40px 20px; }
    .hero {
      text-align: center;
      padding: 60px 20px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    h1 { font-size: 2.5rem; margin-bottom: 8px; }
    .tag { color: #6366f1; font-weight: 600; font-size: 1.2rem; }
    p { margin: 20px 0; color: #475569; font-size: 1.1rem; }
    .btns { margin-top: 30px; display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
    .btn {
      padding: 12px 28px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      transition: 0.2s;
    }
    .btn-fb { background: #1877f2; color: white; }
    .btn-tt { background: #000000; color: white; }
    .btn-yt { background: #FF0000; color: white; }
    .btn:hover { transform: translateY(-2px); opacity: 0.9; }
    footer { text-align: center; margin-top: 60px; color: #94a3b8; font-size: 0.9rem; }
    .nepal { font-size: 1.5rem; }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <div class="nepal">🇳🇵</div>
      <h1>Rojan Katuwal</h1>
      <div class="tag">Video Creator</div>
      <p>Namaste! म Rojan हुँ। Folk dance, Nepali song, अनि creative video content बनाउँछु। Collab को लागि contact गर्नुस् है।</p>
      <div class="btns">
        <a href="https://www.facebook.com/share/1E1qHjzhk5/" class="btn btn-fb" target="_blank">Facebook</a>
        <a href="https://www.tiktok.com/@rojankatuwal99" class="btn btn-tt" target="_blank">TikTok</a>
        <a href="https://www.youtube.com/@jhapa22" class="btn btn-yt" target="_blank">YouTube</a>
      </div>
    </div>
    <footer>© 2026 Rojan Katuwal. Made with ❤️ from Nepal</footer>
  </div>
</body>
</html>
