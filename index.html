<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROJAN KATUWAL | Official Links</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #ff006e 0%, #8338ec 50%, #3a86ff 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 680px;
            width: 100%;
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        .profile-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 50px 30px 40px;
            text-align: center;
        }
        .profile-img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 5px solid white;
            object-fit: cover;
            margin-bottom: 20px;
        }
        .profile-name {
            color: white;
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 8px;
        }
        .profile-bio {
            color: rgba(255, 255, 255, 0.95);
            font-size: 16px;
        }
        .content-section { padding: 30px; }
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 25px;
            background: #000;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .links-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 18px 30px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: 700;
            font-size: 17px;
        }
        .btn-whatsapp { background: #25D366; color: white; }
        .btn-youtube { background: #FF0000; color: white; }
        .btn-white { background: #f0f0f0; color: #1a1a1a; }
        .footer {
            text-align: center;
            padding: 25px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile-section">
            <img src="https://raw.githubusercontent.com/rojankatuwal22-byte/rojankatuwal22-byte.github.io/main/1000118973.jpg" alt="Rojan Katuwal" class="profile-img">
            <h1 class="profile-name">ROJAN KATUWAL</h1>
            <p class="profile-bio">🇳🇵 Nepali Folk Dance Creator | Dubai 🇦🇪</p>
        </div>
        <div class="content-section">
            <div class="video-wrapper">
                <iframe 
                    src="https://www.youtube.com/embed/m-OxdflhuTw" 
                    allow="autoplay; encrypted-media" 
                    allowfullscreen>
                </iframe>
            </div>
            <div class="links-section">
                <a href="https://wa.me/971547983481" class="btn btn-whatsapp" target="_blank">
                    <i class="fab fa-whatsapp"></i> WhatsApp / Hire Me
                </a>
                <a href="https://www.youtube.com/@jhapa22" class="btn btn-youtube" target="_blank">
                    <i class="fab fa-youtube"></i> YouTube @jhapa22
                </a>
                <a href="https://www.tiktok.com/@rojankatuwal99" class="btn btn-white" target="_blank">
                    <i class="fab fa-tiktok"></i> TikTok @rojankatuwal99
                </a>
            </div>
        </div>
        <div class="footer">© 2026 Rojan Katuwal. All Rights Reserved.</div>
    </div>
</body>
</html>
