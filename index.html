<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rojan Katuwal - Digital Creator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid white;
            margin: 0 auto 20px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            color: #667eea;
        }
        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            font-weight: 700;
        }
        .tagline {
            font-size: 16px;
            margin-bottom: 30px;
            opacity: 0.9;
        }
        .social-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 30px;
        }
        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 15px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        .social-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        .social-btn.whatsapp {
            background: #25D366;
            color: white;
        }
        .social-btn.whatsapp:hover {
            background: #20BA5A;
        }
        .social-btn.tiktok {
            background: #000000;
            color: white;
        }
        .social-btn.tiktok:hover {
            background: #FE2C55;
        }
        .social-btn.facebook {
            background: #1877F2;
            color: white;
        }
        .social-btn.facebook:hover {
            background: #166FE5;
        }
        .social-btn.instagram {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            color: white;
        }
        .social-btn.instagram:hover {
            opacity: 0.9;
        }
        .footer {
            margin-top: 40px;
            font-size: 14px;
            opacity: 0.7;
        }
        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }
            h1 {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile-img">
            <i class="fas fa-user"></i>
        </div>
        <h1>ROJAN KATUWAL</h1>
        <p class="tagline">Digital Creator | Dubai, UAE 🇦🇪</p>
        
        <div class="social-buttons">
            <a href="https://wa.me/971567533145" target="_blank" class="social-btn whatsapp">
                <i class="fab fa-whatsapp"></i> WhatsApp
            </a>
            <a href="https://www.tiktok.com/@rojankatuwal22" target="_blank" class="social-btn tiktok">
                <i class="fab fa-tiktok"></i> TikTok
            </a>
            <a href="https://www.facebook.com/share/15kQCcmA9eK/" target="_blank" class="social-btn facebook">
                <i class="fab fa-facebook"></i> Facebook Page
            </a>
            <a href="https://instagram.com/rojankatuwal22" target="_blank" class="social-btn instagram">
                <i class="fab fa-instagram"></i> Instagram
            </a>
        </div>

        <div class="footer">
            <p>© 2026 Rojan Katuwal. All Rights Reserved.</p>
        </div>
    </div>
</body>
</html>
