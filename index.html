        body {

            min-height: 100vh;
            padding: 20px;

        @keyframes gradientShift {

            50% { background-position: 100% 50%; }

        }
        .container {

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }

        }
        .profile-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 50px 30px 40px;
            text-align: center;

        }
        .profile-img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 5px solid white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            object-fit: cover;
            margin-bottom: 20px;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .profile-name {
            color: white;
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 8px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);

            font-size: 16px;
            font-weight: 500;
        }
        .content-section { padding: 30px; }
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 177.78%;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 25px;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .links-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .btn {

            padding: 18px 30px;

            text-decoration: none;
            font-weight: 700;
            font-size: 17px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        .btn:hover {

            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }
        .btn i { font-size: 22px; }
        .btn-whatsapp {

        .btn-youtube {

            color: white;
        }
        .btn-white {
            background: white;
            color: #1a1a1a;
            border: 2px solid #e0e0e0;
        }
        .footer {
            text-align: center;
            padding: 25px;
            color: #666;
            font-size: 14px;
            border-top: 1px solid #eee;
        }
    </style>
</head>
